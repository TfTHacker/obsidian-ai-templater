name: Auto Release on Dependency Updates

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_bump:
        description: "Force version bump and release (true/false)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  bump_tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "21.x"
      - name: Determine whether to bump
        id: gate
        run: |
          set -euo pipefail
          commit_msg="$(git log -1 --pretty=%s)"
          case "$commit_msg" in
            "chore(release):"*)
              echo "should_bump=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.force_bump }}" == "true" ]]; then
            echo "should_bump=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base="${{ github.event.before }}"
          if [[ -z "$base" || "$base" == "0000000000000000000000000000000000000000" ]]; then
            base="$(git rev-parse HEAD^)"
          fi
          echo "base_ref=$base" >> "$GITHUB_OUTPUT"
          changed="$(git diff --name-only "$base" "${{ github.sha }}")"
          if echo "$changed" | grep -Eq '^(package.json|package-lock.json|pnpm-lock.yaml|yarn.lock)$'; then
            echo "should_bump=true" >> "$GITHUB_OUTPUT"
            echo "deps_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_bump=false" >> "$GITHUB_OUTPUT"
            echo "deps_changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Bump version and tag
        if: steps.gate.outputs.should_bump == 'true'
        run: |
          set -euo pipefail
          npm version patch --no-git-tag-version
          npm run version
          version="$(node -p "require('./package.json').version")"
          while git rev-parse -q --verify "refs/tags/${version}" >/dev/null; do
            npm version patch --no-git-tag-version
            npm run version
            version="$(node -p "require('./package.json').version")"
          done
          changelog_tmp="$(mktemp)"
          deps_list=""
          if [[ "${{ steps.gate.outputs.deps_changed }}" == "true" ]]; then
            deps_list="$(BASE_REF="${{ steps.gate.outputs.base_ref }}" node -e 'const fs=require(\"fs\");const {execSync}=require(\"child_process\");const base=process.env.BASE_REF;function readAt(ref){return JSON.parse(execSync(\"git show \"+ref+\":package.json\",{encoding:\"utf8\"}));}const curr=JSON.parse(fs.readFileSync(\"package.json\",\"utf8\"));const prev=readAt(base);function diffDeps(p,c,key){const a=p[key]||{};const b=c[key]||{};const names=new Set([...Object.keys(a),...Object.keys(b)]);const changes=[];for(const name of names){if(a[name]!==b[name]){changes.push({name,from:a[name]||\"added\",to:b[name]||\"removed\"});}}return changes;}const changes=[...diffDeps(prev,curr,\"dependencies\"),...diffDeps(prev,curr,\"devDependencies\"),...diffDeps(prev,curr,\"peerDependencies\"),...diffDeps(prev,curr,\"optionalDependencies\")];for(const c of changes){console.log(\"- \"+c.name+\": \"+c.from+\" -> \"+c.to);}');"
          fi
          {
            echo "# ${version}"
            echo "### Updates"
            if [[ "${{ steps.gate.outputs.deps_changed }}" == "true" ]]; then
              echo "- updated dependencies"
              if [[ -n "$deps_list" ]]; then
                echo "$deps_list"
              fi
            else
              echo "- automated release"
            fi
            echo ""
            cat CHANGELOG.md
          } > "$changelog_tmp"
          mv "$changelog_tmp" CHANGELOG.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json manifest.json versions.json CHANGELOG.md
          git commit -m "chore(release): v${version}"
          git tag -a "${version}" -m "${version}"
          git push origin HEAD:main --tags
      - name: Verify build
        if: steps.gate.outputs.should_bump == 'true'
        run: |
          set -euo pipefail
          npm install
          npm run build
